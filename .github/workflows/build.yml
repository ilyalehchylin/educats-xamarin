name: build

on: [ workflow_dispatch, pull_request ]
  
env:
  COVERAGE_COVERAGE_FILE_PATH: ./coverage/lcov.info

jobs:
  test:
    runs-on: macos-latest
    environment: github-actions-release
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
      
      - name: Setup .NET 7.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '7.0.x'
      
      - name: Unit-Tests Build + Coverlet
        run: |
          rm -rf "$COVERAGE_DIRECTORY"
          mkdir -p "$COVERAGE_DIRECTORY"
          dotnet --version
          dotnet build $PROJECT_PATH
          dotnet test --collect:"XPlat Code Coverage" --settings $COVERLET_SETTINGS --results-directory:"$COVERAGE_DIRECTORY" $PROJECT_PATH
          COVERAGE_FILE_PATH="$(find "$COVERAGE_DIRECTORY" -type f -name "$COVERAGE_INFO_FILENAME" -print -quit)"
          if [ -z "$COVERAGE_FILE_PATH" ]; then
            echo "Coverage file '$COVERAGE_INFO_FILENAME' was not generated."
            exit 1
          fi
          mv "$COVERAGE_FILE_PATH" "${{ env.COVERAGE_COVERAGE_FILE_PATH }}"
        env:
          PROJECT_PATH: ./source/EduCATS.UnitTests/EduCATS.UnitTests.csproj
          COVERLET_SETTINGS: ./source/coverlet.runsettings
          COVERAGE_DIRECTORY: ./coverage
          COVERAGE_INFO_FILENAME: coverage.info          
        
      - name: Codecov Deploy
        uses: codecov/codecov-action@v5.4.3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ${{ env.COVERAGE_COVERAGE_FILE_PATH }}
          os: macos

  build:
    runs-on: macos-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup mono-mdk
        run: |
          brew install --cask mono-mdk
          echo "/Library/Frameworks/Mono.framework/Versions/Current/Commands" >> $GITHUB_PATH

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: NuGet Cache
        uses: actions/cache@v4.2.3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup Xamarin
        run: |
          brew install --cask xamarin-ios
          brew install --cask xamarin-android

      - name: Verify msbuild and Xamarin targets
        run: |
          which msbuild
          msbuild -version
          ls -la /Library/Frameworks/Mono.framework/External/xbuild/Xamarin/iOS || true
      
      - name: NuGet Restore
        run: nuget restore $SOLUTION_PATH
        env:
          SOLUTION_PATH: ./source/EduCATS.sln
        
      - name: Build iOS        
        run: msbuild /t:Build /p:Configuration=$CONFIGURATION /p:Platform=$PLATFORM $PROJECT_PATH
        env:
          CONFIGURATION: Release
          PLATFORM: iPhoneSimulator
          PROJECT_PATH: ./source/EduCATS.iOS/EduCATS.iOS.csproj
          
      - name: Build Android
        run: msbuild /t:Build /p:Configuration=$CONFIGURATION $PROJECT_PATH
        env:
          CONFIGURATION: Release
          PROJECT_PATH: ./source/EduCATS.Android/EduCATS.Android.csproj
