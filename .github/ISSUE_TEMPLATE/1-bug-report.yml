name: 🚩 Bug report
description: Create a report to help us improve
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: describe-the-bug
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: The app crashes when I tap on any setting item in app Settings.
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Explain exactly how we can reproduce the behavior.
      placeholder: |
        1. Go to Settings  
        2. Tap on any settings item  
        3. Observe the crash
    validations:
        required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: |
        The item settings should be successfully set.
    validations:
      required: true
  - type: dropdown
    id: platforms
    attributes:
      label: What platforms are you seeing the problem on?
      multiple: true
      options:
        - Android
        - iOS
    validations:
      required: true
  - type: input
    id: device-model
    attributes:
      label: Device model
      description: e.g. iPhone 14 Pro, Google Pixel 7.
      placeholder: iPhone 14 Pro
  - type: input
    id: device-os
    attributes:
      label: Device OS
      description: e.g. iOS 18.5, Android 15.
      placeholder: iOS 18.5
  - type: input
    id: app-version
    attributes:
      label: App version & build
      description: Found in Settings → About (or similar).
      placeholder: 2.2.7 (build 1089)
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here (logs, network conditions, etc.).
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/ilyalehchylin/educats-xamarin/blob/develop/.github/CODE_OF_CONDUCT.md). 
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
  
